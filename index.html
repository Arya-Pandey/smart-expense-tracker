<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- Login/Register Screen -->
    <div id="authScreen" class="auth-container">
        <div class="auth-card">
            <h2>Smart Expense Tracker</h2>
            <div id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button onclick="login()">Login</button>
                <p>Don&#39;t have an account? <span onclick="showRegister()" class="link">Register</span></p>
            </div>
            <div id="registerForm" style="display: none;">
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <button onclick="register()">Register</button>
                <p>Already have an account? <span onclick="showLogin()" class="link">Login</span></p>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display: none;">
        <header class="header">
            <h1><i class="fas fa-coins me-2"></i>Smart Expense Tracker</h1>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </header>

        <div class="dashboard-grid">
            <!-- Add Expense -->
            <div class="card">
                <h3><i class="fas fa-wallet icon-left"></i>Add New Expense</h3>
                <input type="date" id="expenseDate">
                <select id="expenseCategory">
                    <option value="Food">🍔 Food</option>
                    <option value="Travel">✈️ Travel</option>
                    <option value="Shopping">🛍️ Shopping</option>
                    <option value="Bills">💡 Bills</option>
                    <option value="Other">📦 Other</option>
                </select>
                <input type="number" id="expenseAmount" placeholder="Amount" step="0.01">
                <input type="text" id="expenseDesc" placeholder="Description">
                <button onclick="addExpense()">Add Expense</button>
            </div>

            <!-- Expense List -->
            <div class="card">
                <h3><i class="fas fa-list icon-left"></i>Expense List</h3>
                <div id="totalExpense">Total: $0.00</div>
                <div class="table-container">
                    <table id="expenseTable">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Amount</th>
                                <th>Description</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="expenseTbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Spending Analysis -->
            <div class="card">
                <h3><i class="fas fa-chart-pie icon-left"></i>Spending Analysis</h3>
                <canvas id="pieChart" height="200"></canvas>
                <div id="chartLegend"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
